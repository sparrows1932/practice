<html>
<body>

  <div id="question-container">
    <p>What is the scientific name of a beaver?</p>
    <input type="text" id="userInput" placeholder="Type your answer here...">
    <button onclick="checkAnswer()">Submit</button>
    <p id="feedback"></p>
  </div>

  <script src="https://jsdelivr.net"></script>

  <script>
    function checkAnswer() {
      const correctAnswer = "castor canadensis";
      const userResponse = document.getElementById("userInput").value.trim().toLowerCase();
      const feedback = document.getElementById("feedback");

      if (userResponse === correctAnswer) {
        feedback.innerHTML = "Correct! The scientific name is <b>Castor canadensis</b>.";
        feedback.style.color = "green";
        
        confetti({
          particleCount: 150,
          spread: 70,
          origin: { y: 0.6 }
        });

      } else {
        feedback.innerHTML = "Incorrect. Please try again.";
        feedback.style.color = "red";
      }
    }
  </script>

</body>
</html>
